syntax = "proto3";

package user;

option go_package = "user_service/api/pb";

import "google/protobuf/empty.proto";

message UserId {
  uint64 user_id = 1;
}

message ProductId {
  uint64 product_id = 1;
}

message Product {
  uint64 id = 1;
  uint64 user_id = 2;
  uint64 product_id = 3;
  uint64 product_quantity = 4;
  uint64 price_per_unit = 5;
}

message ProductsInBasket {
  repeated Product products = 1;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
}

message WalletMessage {
  uint64 user_id = 1;
  uint64 amount = 2;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (UserId) {}
  rpc DeleteUser(UserId) returns (google.protobuf.Empty) {}

  rpc ToUpBalance(WalletMessage) returns (google.protobuf.Empty) {}
  rpc ToDownBalance(WalletMessage) returns (google.protobuf.Empty) {}

  rpc GetProductsFromBasket(UserId) returns (ProductsInBasket) {}
  rpc AddProductToBasket(Product) returns (google.protobuf.Empty) {}
  rpc DeleteProductFromBasket(ProductId) returns (google.protobuf.Empty) {}
}
