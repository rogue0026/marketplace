syntax = "proto3";

package product.v1;

option go_package = "product_service/api/product";

import "google/protobuf/empty.proto";

message Product {
  uint64 id = 1;
  string name = 2;
  uint64 price_per_unit = 3;
  uint64 total_quantity = 4;
}

message ShowProductsRequest {
  uint64 page_number = 1;
  uint64 items_per_page = 2;
}

message ShowProductsResponse {
  repeated Product products = 1;
}

message AddProductsRequest {
  repeated Product products = 1;
}

message DeleteProductsRequest {
  uint64 product_id = 1;
}

message ToUpProductsRequest {
  uint64 product_id = 1;
  uint64 quantity = 2;
}

message ToDownProductsRequest {
  uint64 product_id = 1;
  uint64 quantity = 2;
}

service ProductService {
  rpc ShowProducts(ShowProductsRequest) returns (ShowProductsResponse) {}
  rpc AddProducts(AddProductsRequest) returns (google.protobuf.Empty) {}
  rpc DeleteProduct(DeleteProductsRequest) returns (google.protobuf.Empty) {}
  rpc ToUpProducts(ToUpProductsRequest) returns (google.protobuf.Empty) {}
  rpc ToDownProducts(ToDownProductsRequest) returns (google.protobuf.Empty) {}
}
